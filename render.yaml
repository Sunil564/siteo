# Render Blueprint for the SITEO FastAPI backend.
# Docs: https://render.com/docs/blueprint-spec
services:
  - type: web
    name: siteo-api
    runtime: python
    plan: starter
    rootDir: backend
    buildCommand: "pip install -r requirements.txt"
    # Run migrations before the new version goes live.
    preDeployCommand: "alembic upgrade head"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: ENV
        value: production
      - key: PYTHON_VERSION
        value: "3.12.4"
      # Secrets below are set in the Render dashboard (sync:false = not in blueprint).
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: SEED_SUPERADMIN_USERNAME
        sync: false
      - key: SEED_SUPERADMIN_PASSWORD
        sync: false
      - key: WHATSAPP_ENABLED
        value: "false"
      - key: WHATSAPP_PHONE_NUMBER_ID
        sync: false
      - key: WHATSAPP_ACCESS_TOKEN
        sync: false
      - key: SENTRY_DSN
        sync: false
